server.port=8080
spring.application.name=quiz-leaderboard-system

# Base URL for the Validator API
app.quiz.api-base-url=https://devapigw.vidalhealthtpa.com/srm-quiz-task

# Default registration number, can be overridden via ?regNo= query param
app.quiz.default-reg-no=RA2311050010029

# The number of polls to execute
app.quiz.total-polls=10

# Delay between polls in milliseconds
app.quiz.poll-delay-ms=5000

# Max retries per poll (exponential backoff)
app.quiz.max-retries=3

# Enable debug logging for our packages to see dedup details
logging.level.com.vidal.quiz=DEBUG
